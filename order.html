<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Menu | Aura & Spice</title>
  <meta name="description" content="Browse and order from the Aura & Spice digital menu. Scan your table QR code for a seamless dining experience.">
  <link rel="stylesheet" href="./css/style.css">
  <!-- Force consistent origin so localStorage syncs with staff page -->
  <script>
    if (window.location.hostname === '127.0.0.1') {
      window.location.href = window.location.href.replace('127.0.0.1', 'localhost');
    }
  </script>
  <style>
    /* Order-page specific overrides */
    .order-header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 2rem;
    }

    .filter-tabs {
      display: flex;
      gap: 10px;
    }

    .filter-tab {
      padding: 8px 20px;
      border-radius: 50px;
      border: 1px solid var(--glass-border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }

    .filter-tab:hover, .filter-tab.active {
      background: var(--accent-gold);
      color: var(--bg-dark);
      border-color: var(--accent-gold);
      box-shadow: var(--shadow-glow);
    }

    /* Live Tracker */
    .live-tracker {
      background: var(--bg-surface);
      border: 1px solid rgba(212, 175, 55, 0.3);
      padding: 1.5rem 2rem;
      border-radius: 16px;
      display: none;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      box-shadow: var(--shadow-float);
    }

    .live-tracker.visible {
      display: flex;
    }

    .tracker-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    /* Cart Item Row */
    .cart-item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--glass-border);
      font-size: 0.9rem;
    }

    .cart-item-row:last-child { border-bottom: none; }

    .cart-item-name { flex: 1; }

    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      background: transparent;
      color: var(--text-light);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    .qty-btn:hover {
      background: var(--accent-gold);
      color: var(--bg-dark);
      border-color: var(--accent-gold);
    }

    .cart-item-price {
      color: var(--accent-gold);
      font-weight: 600;
      min-width: 60px;
      text-align: right;
    }

    /* Add button feedback */
    .btn-add {
      display: inline-block;
      background: transparent;
      color: var(--accent-gold);
      border: 1px solid rgba(212, 175, 55, 0.4);
      padding: 8px 20px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.8rem;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .btn-add:hover {
      background: var(--accent-gold);
      color: var(--bg-dark);
    }

    .btn-add.added {
      background: var(--status-ready);
      border-color: var(--status-ready);
      color: white;
      pointer-events: none;
    }

    @keyframes bounceIn {
      0% { transform: scale(1); }
      30% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .badge-bounce { animation: bounceIn 0.4s ease; }

    /* ---- Order Page Mobile Responsive ---- */
    @media (max-width: 768px) {
      .order-header-bar {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 1.5rem;
      }

      .order-header-bar h2 {
        font-size: 1.5rem;
      }

      .filter-tabs {
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding-bottom: 4px;
      }

      .filter-tabs::-webkit-scrollbar { display: none; }

      .filter-tab {
        white-space: nowrap;
        flex-shrink: 0;
        padding: 8px 16px;
        font-size: 0.8rem;
        min-height: 40px;
      }

      .live-tracker {
        padding: 1rem 1.2rem !important;
        border-radius: 12px;
      }

      #tracker-status {
        font-size: 1rem !important;
      }

      #tracker-desc {
        font-size: 0.8rem !important;
      }

      .tracker-step .step-circle,
      .step-circle {
        width: 30px !important;
        height: 30px !important;
        font-size: 0.85rem !important;
      }

      .cart-item-row {
        font-size: 0.85rem;
        padding: 8px 0;
      }

      .cart-item-name {
        font-size: 0.85rem;
        max-width: 45%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    }

    @media (max-width: 480px) {
      .order-header-bar h2 {
        font-size: 1.3rem;
      }

      .filter-tab {
        padding: 6px 12px;
        font-size: 0.75rem;
      }

      #tracker-steps {
        gap: 4px;
      }

      .tracker-step span {
        font-size: 0.6rem !important;
      }

      .step-line {
        flex: 0.3 !important;
      }
    }
  </style>
</head>
<body style="padding-top: 90px;">

  <!-- Header -->
  <header id="header" class="scrolled">
    <div class="logo">Aura<span>&</span>Spice</div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <span style="color: var(--text-muted); font-size: 0.85rem;">Table</span>
      <select id="table-selector" style="
        background: var(--bg-surface);
        border: 1px solid var(--accent-gold);
        color: var(--accent-gold);
        padding: 6px 12px;
        border-radius: 8px;
        font-family: 'Inter', sans-serif;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        outline: none;
        min-width: 70px;
      ">
      </select>
    </div>
  </header>

  <div class="container">
    <!-- ===== ENHANCED LIVE STATUS TRACKER ===== -->
    <div class="live-tracker" id="live-tracker" style="flex-direction: column; gap: 16px; padding: 1.5rem 2rem;">
      <!-- Status Header -->
      <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <div>
          <h3 id="tracker-status" style="font-size: 1.2rem; color: var(--status-new); margin-bottom: 4px;">Order Placed!</h3>
          <p id="tracker-desc" style="color: var(--text-muted); font-size: 0.85rem;">The kitchen has received your order.</p>
        </div>
        <div class="tracker-dot" id="tracker-dot" style="background: var(--status-new); box-shadow: 0 0 10px var(--status-new);"></div>
      </div>
      <!-- Step-by-Step Progress -->
      <div id="tracker-steps" style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        position: relative;
        padding: 8px 0;
      ">
        <div class="tracker-step" data-step="new" style="text-align: center; flex: 1; position: relative; z-index: 1;">
          <div class="step-circle active" style="
            width: 36px; height: 36px; border-radius: 50%; margin: 0 auto 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; transition: all 0.4s ease;
            background: var(--status-new); color: white;
          ">🍽️</div>
          <span style="font-size: 0.7rem; color: var(--text-muted);">Received</span>
        </div>
        <div class="step-line" style="flex: 0.5; height: 2px; background: var(--glass-border); transition: background 0.4s ease;"></div>
        <div class="tracker-step" data-step="cooking" style="text-align: center; flex: 1; position: relative; z-index: 1;">
          <div class="step-circle" style="
            width: 36px; height: 36px; border-radius: 50%; margin: 0 auto 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; transition: all 0.4s ease;
            background: var(--bg-surface); color: var(--text-dim); border: 2px solid var(--glass-border);
          ">👨‍🍳</div>
          <span style="font-size: 0.7rem; color: var(--text-muted);">Cooking</span>
        </div>
        <div class="step-line" style="flex: 0.5; height: 2px; background: var(--glass-border); transition: background 0.4s ease;"></div>
        <div class="tracker-step" data-step="ready" style="text-align: center; flex: 1; position: relative; z-index: 1;">
          <div class="step-circle" style="
            width: 36px; height: 36px; border-radius: 50%; margin: 0 auto 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; transition: all 0.4s ease;
            background: var(--bg-surface); color: var(--text-dim); border: 2px solid var(--glass-border);
          ">✨</div>
          <span style="font-size: 0.7rem; color: var(--text-muted);">Ready</span>
        </div>
        <div class="step-line" style="flex: 0.5; height: 2px; background: var(--glass-border); transition: background 0.4s ease;"></div>
        <div class="tracker-step" data-step="completed" style="text-align: center; flex: 1; position: relative; z-index: 1;">
          <div class="step-circle" style="
            width: 36px; height: 36px; border-radius: 50%; margin: 0 auto 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; transition: all 0.4s ease;
            background: var(--bg-surface); color: var(--text-dim); border: 2px solid var(--glass-border);
          ">😊</div>
          <span style="font-size: 0.7rem; color: var(--text-muted);">Served</span>
        </div>
      </div>
    </div>

    <!-- Filters -->
    <div class="order-header-bar">
      <h2 style="font-size: 2rem;">Digital Menu</h2>
      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="chinese">🔥 Chinese</button>
        <button class="filter-tab" data-filter="north-indian">🍛 North Indian</button>
        <button class="filter-tab" data-filter="south-indian">🥘 South Indian</button>
        <button class="filter-tab" data-filter="fast-food">🍔 Fast Food</button>
        <button class="filter-tab" data-filter="beverages">🥤 Beverages</button>
      </div>
    </div>

    <!-- Menu Grid -->
    <div class="menu-grid" id="menu-items"></div>
  </div>

  <!-- Floating Cart Bubble -->
  <button class="cart-bubble" id="cart-btn" aria-label="Open Cart">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
    <div class="badge" id="cart-badge">0</div>
  </button>

  <!-- Cart Panel -->
  <div class="cart-panel" id="cart-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 12px; margin-bottom: 15px;">
      <h3 style="font-size: 1.2rem;">Your Order</h3>
      <button id="close-cart" style="background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.5rem; line-height: 1;">&times;</button>
    </div>
    <div id="cart-items" style="max-height: 280px; overflow-y: auto; margin-bottom: 15px;">
      <p style="color: var(--text-muted); text-align: center; padding: 20px 0;">Your cart is empty.</p>
    </div>
    <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 1.1rem; margin-bottom: 20px; padding-top: 10px; border-top: 1px solid var(--glass-border);">
      <span>Total</span>
      <span id="cart-total" style="color: var(--accent-gold);">₹0</span>
    </div>
    <button id="checkout-btn" class="btn-primary" style="width: 100%; text-align: center;">Place Order</button>
  </div>

  <!-- Success Overlay -->
  <div class="success-overlay" id="success-overlay">
    <div class="success-checkmark">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h2 style="font-size: 2rem; margin-bottom: 8px;">Order Placed!</h2>
    <p style="color: var(--text-muted); font-size: 1rem;">Your delicious meal is being prepared.</p>
  </div>

  <script src="./js/order.js"></script>
</body>
</html>
